<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ASCEND // VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --border: #222222;
            --subtext: #888888;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header { flex-shrink: 0; background: var(--bg); z-index: 100; }
        nav { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: -1px; }
        
        .tabs-bar { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); background: #050505; scrollbar-width: none; }
        .tabs-bar::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 15px 20px; background: none; border: none; color: #555; font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { color: #fff; background: #111; }
        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; -webkit-overflow-scrolling: touch; }
        .page { display: none; max-width: 600px; margin: 0 auto; }
        .page.active { display: block; }
        h2 { font-weight: 900; font-size: 1.8rem; margin-bottom: 20px; letter-spacing: -1.2px; }
        .card { border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; position: relative; background: #050505; }
        
        .sub-label { font-family: var(--font-mono); font-size: 0.6rem; color: var(--subtext); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
        .settings-trigger { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #333; cursor: pointer; font-size: 1rem; }
        .task-item { display: flex; align-items: center; gap: 15px; padding: 16px 0; border-bottom: 1px solid #111; cursor: pointer; transition: opacity 0.2s; }
        .empty-check { width: 22px; height: 22px; border: 1px solid #fff; background: none; flex-shrink: 0; }
        .log-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 10px; }
        .grid-sq { aspect-ratio: 1; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 0.6rem; color: #444; }
        .grid-sq.filled { background: #fff; color: #000; border-color: #fff; font-weight: bold; }
        .traj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { border: 1px solid var(--border); padding: 12px; background: #050505; }
        .stat-value { font-size: 1.2rem; font-weight: 700; font-family: var(--font-mono); }
        .add-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .add-row input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; font-family: var(--font-mono); font-size: 0.8rem; }
        .add-btn { background: #fff; color: #000; border: none; padding: 0 20px; font-weight: 900; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; padding: 20px; }
        .modal-content { 
            max-width: 450px; 
            max-height: 85vh;
            margin: 20px auto; 
            background: #000; 
            border: 1px solid var(--border); 
            padding: 25px; 
            overflow-y: auto;
            position: relative;
        }
        textarea, .modal input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; margin: 8px 0; font-family: var(--font-mono); font-size: 0.8rem; }
        .save-btn { background: #fff; color: #000; padding: 14px; width: 100%; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 8px; position: sticky; bottom: -25px; }

        /* ── SCHEDULE STYLES ── */
        .sched-block {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid #111;
            cursor: pointer;
            transition: opacity 0.2s;
            position: relative;
        }
        .sched-block:last-child { border-bottom: none; }
        .sched-block.done { opacity: 0.35; }
        .sched-block.done .sched-name { text-decoration: line-through; color: #555; }
        .sched-check {
            width: 20px;
            height: 20px;
            border: 1px solid #fff;
            flex-shrink: 0;
            margin-top: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
        .sched-check.checked { background: #fff; color: #000; }
        .sched-meta { flex: 1; }
        .sched-time { font-family: var(--font-mono); font-size: 0.6rem; color: #007aff; letter-spacing: 1px; margin-bottom: 3px; }
        .sched-name { font-size: 0.95rem; font-weight: 600; }
        .sched-tag {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 0.55rem;
            color: #444;
            border: 1px solid #222;
            padding: 2px 6px;
            margin-top: 4px;
            text-transform: uppercase;
        }
        .sched-progress-wrap { height: 2px; background: #111; margin: 12px 0 4px; }
        .sched-progress-fill { height: 100%; background: #007aff; transition: width 0.4s; }
        .sched-summary { font-family: var(--font-mono); font-size: 0.6rem; color: #444; margin-bottom: 14px; }

        /* current time indicator */
        .sched-block.current-block { border-left: 2px solid #007aff; padding-left: 12px; }
        .sched-block.current-block .sched-time { color: #fff; }
    </style>
</head>
<body>
<header>
    <nav><div class="logo">ASCEND</div><div id="clock" style="font-family: var(--font-mono); font-size: 0.65rem; color: var(--subtext);"></div></nav>
    <div class="tabs-bar" id="tabsList">
        <button class="tab-btn active"  onclick="openPage('log')">Log</button>
        <button class="tab-btn"         onclick="openPage('schedule')">Schedule</button>
        <button class="tab-btn"         onclick="openPage('gym')">Gym</button>
        <button class="tab-btn"         onclick="openPage('abs')">Abs</button>
        <button class="tab-btn"         onclick="openPage('nutrition')">Nutrition</button>
        <button class="tab-btn"         onclick="openPage('growth')">Growth</button>
        <button class="tab-btn"         onclick="openPage('vitamins')">Vitamins</button>
        <button class="tab-btn"         onclick="openPage('water')">Water</button>
        <button class="tab-btn"         onclick="openPage('skincare')">Skincare</button>
        <button class="tab-btn"         onclick="openPage('work')">Work</button>
        <button class="tab-btn"         onclick="openPage('weight')">Weight</button>
        <button class="tab-btn"         onclick="openPage('system')">System</button>
    </div>
</header>
<main id="scrollArea">
    <!-- LOG -->
    <div id="log" class="page active">
        <h2>DAILY LOG</h2>
        <div class="card"><span class="sub-label">Completion Matrix</span><div class="log-grid" id="mainGrid"></div></div>
    </div>

    <!-- SCHEDULE -->
    <div id="schedule" class="page">
        <h2>DAILY SCHEDULE</h2>
        <div class="card">
            <button class="settings-trigger" onclick="openSettings('schedule')">⚙️</button>
            <span class="sub-label">Today's Timeline</span>
            <div class="sched-progress-wrap"><div class="sched-progress-fill" id="schedProgBar" style="width:0%"></div></div>
            <div class="sched-summary" id="schedSummary"></div>
            <div id="schedList"></div>
        </div>
    </div>

    <!-- GYM -->
    <div id="gym" class="page">
        <h2>GYM ROUTINE</h2>
        <div class="card"><button class="settings-trigger" onclick="openSettings('gym')">⚙️</button><span class="sub-label" id="gymDay"></span><div id="gymTasks"></div></div>
    </div>

    <!-- WORK -->
    <div id="work" class="page">
        <h2>WORK MISSIONS</h2>
        <div class="add-row"><input type="text" id="workIn" placeholder="Enter Mission..."><button class="add-btn" onclick="addWork()">+</button></div>
        <div id="workTasks" class="card"></div>
    </div>

    <!-- WEIGHT -->
    <div id="weight" class="page">
        <h2>WEIGHT TRAJECTORY</h2>
        <div class="card">
            <button class="settings-trigger" onclick="openSettings('weight')">⚙️</button>
            <span class="sub-label">Current Weight Entry</span>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="wInput" placeholder="0.0" step="0.1" style="flex:1; background:black; border:1px solid #222; color:white; padding:10px;">
                <button class="add-btn" onclick="logWeight()">LOG</button>
            </div>
        </div>
        <div class="traj-grid" id="weightStats"></div>
    </div>

    <!-- SYSTEM -->
    <div id="system" class="page">
        <h2>SYSTEM</h2>
        <div class="card" onclick="wipe()" style="cursor:pointer; text-align:center; border-color: #400;"><span class="sub-label" style="color:red;">Hardware Reset</span><h3 style="color:red;">ERASE ALL DATA</h3></div>
    </div>

    <!-- GENERIC (shared page for abs/nutrition/growth/vitamins/water/skincare) -->
    <div id="generic" class="page">
        <h2 id="gTitle"></h2>
        <div class="card"><button class="settings-trigger" id="gSet">⚙️</button><span class="sub-label">Daily Protocol</span><div id="gTasks"></div></div>
    </div>
</main>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="sub-label" id="mTitle">CONFIGURATION</span>
        <div id="mInputs"></div>
        <button class="save-btn" onclick="saveSettings()">Save Changes</button>
        <button class="save-btn" style="background:#111; color:#555; margin-bottom: 20px;" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const getTodayStr = () => new Date().toISOString().split('T')[0];

    const DEFAULT_SCHEDULE = [
        { time: "08:00", name: "Wake up",                          tag: "morning"   },
        { time: "08:00", name: "Ab workout",                       tag: "fitness"   },
        { time: "08:10", name: "Shower & brush teeth",             tag: "morning"   },
        { time: "08:30", name: "Breakfast",                        tag: "nutrition" },
        { time: "08:30", name: "Day trading practice — futures",   tag: "trading"   },
        { time: "10:00", name: "AI work block 1",                  tag: "work"      },
        { time: "12:15", name: "Lunch",                            tag: "nutrition" },
        { time: "13:00", name: "AI work block 2",                  tag: "work"      },
        { time: "14:00", name: "Free time",                        tag: "rest"      },
        { time: "17:00", name: "Dinner",                           tag: "nutrition" },
        { time: "18:00", name: "Gym",                              tag: "fitness"   },
        { time: "19:00", name: "French practice",                  tag: "growth"    },
        { time: "20:00", name: "Day trading video",                tag: "trading"   },
        { time: "21:00", name: "Devotional",                       tag: "growth"    },
        { time: "22:00", name: "Sleep",                            tag: "rest"      },
    ];

    let state = JSON.parse(localStorage.getItem('ascend_v10')) || {
        done: {}, weight: [], perfect: [],
        schedDone: {},   // { "YYYY-MM-DD": [index, index, ...] }
        settings: {
            nutrition: "Meal 1\nMeal 2\nMeal 3",
            growth: "Read\nMeditate",
            vitamins: "Vitamins",
            skincare: "Wash",
            abs: "Leg Raises\nPlank\nRussian Twists",
            water: "Protein Shaker 1 (10AM)\nProtein Shaker 2 (1PM)\nProtein Shaker 3 (5PM)",
            gym: { "Monday":"Push Routine","Tuesday":"Pull Routine","Wednesday":"Leg Routine","Thursday":"Rest","Friday":"Upper Body","Saturday":"Lower Body","Sunday":"Rest" },
            weightGoal: 140, weightStart: 115, targetDate: "2026-08-31",
            work: [],
            schedule: DEFAULT_SCHEDULE   // array of {time, name, tag}
        }
    };

    // Migrate older saves that don't have schedule/schedDone
    if (!state.settings.schedule) state.settings.schedule = DEFAULT_SCHEDULE;
    if (!state.schedDone) state.schedDone = {};

    function save() {
        localStorage.setItem('ascend_v10', JSON.stringify(state));
        checkPerfectDay();
        render();
    }

    function checkPerfectDay() {
        const today = getTodayStr();
        const totalReq = getTodayTaskCount();
        const completedTasks = state.done[today] || [];
        const completedReq = completedTasks.filter(id => !id.startsWith('work-')).length;
        if (totalReq > 0 && completedReq >= totalReq) {
            if (!state.perfect.includes(today)) state.perfect.push(today);
        } else {
            state.perfect = state.perfect.filter(d => d !== today);
        }
    }

    function getTodayTaskCount() {
        let count = 0;
        ['nutrition','growth','vitamins','skincare','water','abs'].forEach(t => {
            count += state.settings[t].split('\n').filter(l => l.trim()).length;
        });
        const day = dayNames[new Date().getDay()];
        count += (state.settings.gym[day] || "").split('\n').filter(l => l.trim()).length;
        return count;
    }

    function openPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active');
            if (b.textContent.toLowerCase() === id.toLowerCase()) b.classList.add('active');
        });
        const generics = ['nutrition','growth','vitamins','skincare','water','abs'];
        if (generics.includes(id)) {
            document.getElementById('generic').classList.add('active');
            document.getElementById('gTitle').innerText = id.toUpperCase();
            document.getElementById('gSet').onclick = () => openSettings(id);
            renderGeneric(id);
        } else {
            document.getElementById(id).classList.add('active');
            if (id === 'schedule') renderSchedule();
        }
        document.getElementById('scrollArea').scrollTop = 0;
        render();
    }

    function render() {
        renderGrid(); renderGym(); renderWeight(); renderWork();
        renderSchedule();
        document.getElementById('clock').innerText = new Date().toDateString().toUpperCase();
    }

    /* ── GRID ── */
    function renderGrid() {
        const g = document.getElementById('mainGrid'); g.innerHTML = '';
        const now = new Date();
        const year = now.getFullYear(); const month = now.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        for (let i = 1; i <= 31; i++) {
            const s = document.createElement('div');
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            s.className = 'grid-sq' + (state.perfect.includes(dateStr) ? ' filled' : '');
            s.innerText = i;
            if (i > daysInMonth) s.style.opacity = '0';
            g.appendChild(s);
        }
    }

    /* ── GENERIC TASK RENDERER ── */
    function renderTask(text, id, container) {
        const today = getTodayStr();
        if (state.done[today]?.includes(id)) return;
        const d = document.createElement('div');
        d.className = 'task-item';
        d.innerHTML = `<div class="empty-check"></div><span>${text}</span>`;
        d.onclick = () => {
            d.style.opacity = '0';
            setTimeout(() => {
                const nowToday = getTodayStr();
                if (!state.done[nowToday]) state.done[nowToday] = [];
                state.done[nowToday].push(id);
                save();
            }, 150);
        };
        container.appendChild(d);
    }

    function renderGeneric(t) {
        const c = document.getElementById('gTasks'); c.innerHTML = '';
        state.settings[t].split('\n').filter(l => l.trim()).forEach((l, i) => renderTask(l, `${t}-${i}`, c));
    }

    /* ── GYM ── */
    function renderGym() {
        const d = dayNames[new Date().getDay()];
        document.getElementById('gymDay').innerText = `CURRENT SESSION / ${d}`;
        const c = document.getElementById('gymTasks'); c.innerHTML = '';
        (state.settings.gym[d] || "Rest Day").split('\n').filter(l => l.trim()).forEach((l, i) => renderTask(l, `gym-${i}`, c));
    }

    /* ── WORK ── */
    function renderWork() {
        const c = document.getElementById('workTasks'); c.innerHTML = '';
        state.settings.work.forEach((t, i) => renderTask(t, `work-${i}`, c));
    }

    /* ── SCHEDULE ── */
    function renderSchedule() {
        const cont = document.getElementById('schedList');
        if (!cont) return;
        const today = getTodayStr();
        const doneTodayIdx = state.schedDone[today] || [];
        const items = state.settings.schedule;
        const total = items.length;
        const doneCount = doneTodayIdx.length;

        // Progress bar
        const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
        document.getElementById('schedProgBar').style.width = pct + '%';
        document.getElementById('schedSummary').innerText = `${doneCount} / ${total} COMPLETE`;

        // Find current block (closest time that hasn't passed by more than 1h)
        const now = new Date();
        const nowMins = now.getHours() * 60 + now.getMinutes();
        let currentIdx = -1;
        items.forEach((item, i) => {
            const [h, m] = item.time.split(':').map(Number);
            const itemMins = h * 60 + m;
            if (itemMins <= nowMins) currentIdx = i;
        });

        cont.innerHTML = '';
        items.forEach((item, i) => {
            const isDone = doneTodayIdx.includes(i);
            const isCurrent = (i === currentIdx && !isDone);

            const block = document.createElement('div');
            block.className = 'sched-block' + (isDone ? ' done' : '') + (isCurrent ? ' current-block' : '');

            block.innerHTML = `
                <div class="sched-check ${isDone ? 'checked' : ''}">${isDone ? '✓' : ''}</div>
                <div class="sched-meta">
                    <div class="sched-time">${item.time}${isCurrent ? ' ← NOW' : ''}</div>
                    <div class="sched-name">${item.name}</div>
                    ${item.tag ? `<span class="sched-tag">${item.tag}</span>` : ''}
                </div>`;

            block.onclick = () => {
                if (!state.schedDone[today]) state.schedDone[today] = [];
                if (isDone) {
                    state.schedDone[today] = state.schedDone[today].filter(x => x !== i);
                } else {
                    state.schedDone[today].push(i);
                }
                save();
            };
            cont.appendChild(block);
        });
    }

    /* ── WEIGHT ── */
    function logWeight() {
        const v = parseFloat(document.getElementById('wInput').value);
        if (v) { state.weight.push({ date: getTodayStr(), val: v }); save(); }
        document.getElementById('wInput').value = '';
    }

    function renderWeight() {
        const logs = state.weight;
        const start = state.settings.weightStart;
        const goal = state.settings.weightGoal;
        const cur = logs.length ? logs[logs.length-1].val : start;
        let projDateStr = "LOG 2+ DAYS";
        let status = "ANALYZING...";
        let budget = 2100;
        if (logs.length >= 1) {
            const daysToDeadline = (new Date(state.settings.targetDate) - new Date()) / 86400000;
            if (daysToDeadline > 0) {
                const lbsNeeded = goal - cur;
                budget = 2100 + ((lbsNeeded * 3500) / daysToDeadline);
            }
            if (logs.length >= 2) {
                const first = logs[0]; const last = logs[logs.length-1];
                const timeDiff = (new Date(last.date) - new Date(first.date)) / 86400000;
                const weightDiff = last.val - first.val;
                if (timeDiff > 0) {
                    const dailyRate = weightDiff / timeDiff;
                    if (dailyRate > 0) {
                        const daysLeft = (goal - cur) / dailyRate;
                        const finalDate = new Date();
                        finalDate.setDate(finalDate.getDate() + Math.ceil(daysLeft));
                        projDateStr = finalDate.toLocaleDateString('en-US', { month:'short', day:'numeric' });
                    } else { projDateStr = "STAGNANT"; }
                    const totalDaysAllowed = (new Date(state.settings.targetDate) - new Date(first.date)) / 86400000;
                    const requiredRate = (goal - start) / totalDaysAllowed;
                    status = dailyRate >= requiredRate ? "AHEAD" : "BEHIND";
                }
            }
        }
        document.getElementById('weightStats').innerHTML = `
            <div class="stat-box"><span class="sub-label">Current</span><div class="stat-value">${cur} lbs</div></div>
            <div class="stat-box"><span class="sub-label">Goal</span><div class="stat-value">${goal} lbs</div></div>
            <div class="stat-box"><span class="sub-label">Status</span><div class="stat-value" style="color:${status==='BEHIND'?'#ff4444':'white'}">${status}</div></div>
            <div class="stat-box"><span class="sub-label">Est. Intake</span><div class="stat-value">${Math.round(budget)} kcal</div></div>
            <div class="stat-box"><span class="sub-label">Progress</span><div class="stat-value">${Math.round(((cur-start)/(goal-start))*100)}%</div></div>
            <div class="stat-box"><span class="sub-label">Projected Date</span><div class="stat-value" style="font-size:0.8rem">${projDateStr}</div></div>`;
    }

    /* ── WORK ADD ── */
    function addWork() {
        const v = document.getElementById('workIn').value;
        if (v) { state.settings.work.push(v); save(); }
        document.getElementById('workIn').value = '';
    }

    /* ── SETTINGS MODAL ── */
    let curEdit = '';
    function openSettings(t) {
        curEdit = t;
        document.getElementById('modal').style.display = 'block';
        const inp = document.getElementById('mInputs'); inp.innerHTML = '';
        document.getElementById('mTitle').innerText = t.toUpperCase() + ' // CONFIG';

        if (t === 'gym') {
            dayNames.forEach(d => inp.innerHTML += `<span class="sub-label">${d} Routine</span><textarea id="s-${d}">${state.settings.gym[d]||''}</textarea>`);
        } else if (t === 'weight') {
            inp.innerHTML = `<span class="sub-label">Start Weight</span><input id="sw" type="number" step="0.1" value="${state.settings.weightStart}">
                             <span class="sub-label">Goal Weight</span><input id="sg" type="number" step="0.1" value="${state.settings.weightGoal}">
                             <span class="sub-label">Target Deadline</span><input type="date" id="sd" value="${state.settings.targetDate}">`;
        } else if (t === 'schedule') {
            // Editable as "HH:MM | Name | tag" lines
            const raw = state.settings.schedule.map(s => `${s.time} | ${s.name} | ${s.tag}`).join('\n');
            inp.innerHTML = `
                <span class="sub-label" style="margin-bottom:6px;">Format: HH:MM | Task Name | tag</span>
                <textarea id="sg" style="min-height:320px;">${raw}</textarea>`;
        } else {
            inp.innerHTML = `<textarea id="sg">${state.settings[t]}</textarea>`;
        }
        document.querySelector('.modal-content').scrollTop = 0;
    }

    function saveSettings() {
        if (curEdit === 'gym') {
            dayNames.forEach(d => state.settings.gym[d] = document.getElementById(`s-${d}`).value);
        } else if (curEdit === 'weight') {
            state.settings.weightStart = parseFloat(document.getElementById('sw').value);
            state.settings.weightGoal = parseFloat(document.getElementById('sg').value);
            state.settings.targetDate = document.getElementById('sd').value;
        } else if (curEdit === 'schedule') {
            const raw = document.getElementById('sg').value;
            state.settings.schedule = raw.split('\n').filter(l => l.trim()).map(line => {
                const parts = line.split('|').map(s => s.trim());
                return { time: parts[0] || '00:00', name: parts[1] || line, tag: parts[2] || '' };
            });
            // Reset today's schedule done on edit
            state.schedDone[getTodayStr()] = [];
        } else {
            state.settings[curEdit] = document.getElementById('sg').value;
        }
        closeModal(); save();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function wipe() { if (confirm("FORMAT SYSTEM?")) { localStorage.clear(); location.reload(); } }

    // Auto-refresh schedule "← NOW" indicator every minute
    setInterval(() => { renderSchedule(); }, 60000);

    render();
</script>
</body>
</html>
